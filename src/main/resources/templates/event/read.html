<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>행사 상세 보기 | 도서관</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard", sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .header { border-bottom: 2px solid #003366; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 24px; color: #1a1a1a; margin: 0; }
        .status { padding: 5px 15px; background: #eef2f7; color: #003366; border-radius: 20px; font-weight: 600; font-size: 14px; }

        .content-wrapper { display: flex; gap: 40px; margin-bottom: 40px; }
        .poster { width: 300px; height: 420px; background: #eee; border-radius: 8px; overflow: hidden; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }

        .info-table { flex: 1; border-top: 1px solid #333; }
        .info-row { display: flex; border-bottom: 1px solid #eee; align-items: center; }
        .info-label { width: 100px; background: #f9f9f9; padding: 15px; font-weight: 600; font-size: 15px; color: #555; }
        .info-value { flex: 1; padding: 15px; font-size: 15px; color: #333; }

        .btn-group { text-align: center; border-top: 1px solid #eee; padding-top: 30px; }
        .btn { padding: 12px 35px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-list { background: #0056b3; color: #fff; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 th:text="${dto.title}">2025년 11월 「월간 인문학을 만나다」</h1>
        <span class="status">신청가능</span>
    </div>

    <div class="content-wrapper">
        <div class="poster">
            <img th:if="${dto.imageName}" th:src="@{'/display?fileName=' + ${dto.imageName}}" alt="행사 포스터">
            <div th:unless="${dto.imageName}" style="text-align: center; padding-top: 180px; color: #999;">이미지 준비중</div>
        </div>

        <div class="info-table">
            <div class="info-row">
                <div class="info-label">카테고리</div>
                <div class="info-value" th:text="${dto.category}">강연·세미나</div>
            </div>
            <div class="info-row">
                <div class="info-label">일시</div>
                <div class="info-value" th:text="${#temporals.format(dto.eventDate, 'yyyy-MM-dd HH:mm')}">2026-03-28 14:00</div>
            </div>
            <div class="info-row">
                <div class="info-label">장소</div>
                <div class="info-value" th:text="${dto.place}">디지털도서관 문화소강당(B2)</div>
            </div>
            <div class="info-row">
                <div class="info-label">비고</div>
                <div class="info-value" th:text="${dto.extraInfo}">감독 장병기</div>
            </div>
            <div class="info-row" style="border-bottom: 1px solid #333;">
                <div class="info-label">내용</div>
                <div class="info-value" th:text="${dto.content}">행사 상세 내용이 여기에 들어갑니다.</div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <a th:href="@{/event/list}" class="btn btn-list">목록으로</a>
    </div>
</div>

</body>
</html>
