    <!-- 타이틀 섹션 -->
    <div class="my-title-wrap">
        <span class="en">MY LIBRARY</span>
        <h2 id="greeting-name">회원님의 대출 현황</h2>
        <p>현재 대출 중인 도서를 확인하실 수 있습니다.</p>
    </div>

    <!-- 본문 -->
    <div class="container mb-5 pt-4">

        <!-- 통계 카드 -->
        <div class="stat-row">
            <div class="stat-card sc-blue">
                <div class="stat-label">대출 중</div>
                <div class="stat-value" id="st-rented">—</div>
                <div class="stat-sub">현재 빌린 도서</div>
            </div>
            <div class="stat-card sc-warn">
                <div class="stat-label">연체</div>
                <div class="stat-value" id="st-overdue">—</div>
                <div class="stat-sub">반납 기한 초과</div>
            </div>
            <div class="stat-card sc-green">
                <div class="stat-label">연장 가능</div>
                <div class="stat-value" id="st-renewable">—</div>
                <div class="stat-sub">연장 안 한 도서</div>
            </div>
        </div>

        <!-- 대출 목록 -->
        <div class="section">
            <div class="section-head">
                <div class="section-title">
                    <i class="bi bi-journals me-2"></i>내 대출 목록
                </div>
                <button class="btn-ghost"
                        style="font-size:0.76rem;padding:6px 12px;"
                        onclick="loadMyRentals()">
                    <i class="bi bi-arrow-clockwise"></i> 새로고침
                </button>
            </div>
            <div class="rental-list" id="rental-list">
                <div class="empty-state">
                    <span class="spinner"
                          style="width:24px;height:24px;border-width:3px;color:var(--accent);"></span>
                </div>
            </div>
        </div>

        <p class="text-muted mt-4" style="font-size:0.82rem;">
            ※ 반납 기한이 지난 도서는 연체로 표시됩니다.
        </p>

    </div>

    <!-- 상세 모달 -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="bi bi-file-text me-2"></i>대출 상세
                </div>
                <button class="modal-close" onclick="closeModalPanel()">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- 토스트 -->
    <div id="toast-wrap"></div>

        var CURRENT_ROLE        = CURRENT_MEMBER_ROLE;
