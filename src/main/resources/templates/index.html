<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산도서관 메인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. 풀 페이지 스크롤 설정 */
        html, body {
            margin: 0; padding: 0;
            height: 100%;
            scroll-snap-type: y mandatory; /* Y축 자석 효과 */
            overflow-y: scroll;
        }
        section {
            height: 100vh; /* 화면 꽉 채우기 */
            scroll-snap-align: start; /* 섹션 시작점에 착 붙기 */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Section 1: 배경 이미지 및 검색바 */
        #section1 {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
            url('https://via.placeholder.com/1920x1080?text=Library+Background') no-repeat center center/cover;
            color: white;
        }
        .search-box {
            width: 80%; max-width: 600px;
            background: white;
            border-radius: 50px;
            padding: 10px 25px;
            display: flex; align-items: center;
        }
        .weather-info {
            position: absolute; top: 15%; right: 10%;
            background: rgba(0, 123, 255, 0.8);
            padding: 15px; border-radius: 30px;
        }

        /* Section 2: 도서관 소식 탭 */
        #section2 { background-color: #f8f9fa; }
        .nav-tabs .nav-link.active { background-color: #007bff; color: white; }

        /* Section 3: 공간 소개 캐러셀 */
        #section3 { background-color: #ffffff; }
        .carousel-item img { height: 60vh; object-fit: cover; }
    </style>
</head>
<body>

<section id="section1">
    <div class="weather-info shadow">
        <span id="busan-temp">로딩 중...</span>
        <span id="weather-icon">☁️</span>
    </div>

    <h1 class="display-3 fw-bold mb-4">BUSAN LIBRARY</h1>
    <div class="search-box shadow">
        <input type="text" class="form-control border-0 shadow-none"
               placeholder="찾으시는 도서의 정보를 입력하세요.">
        <button class="btn text-primary"><i class="bi bi-search">🔍</i></button>
    </div>
</section>

<section id="section2" class="container">
    <h2 class="mb-5 fw-bold">도서관 소식</h2>
    <ul class="nav nav-tabs mb-4" id="newsTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#notice">공지사항</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#event">문화행사</button></li>
    </ul>
    <div class="tab-content w-100 p-4 bg-white rounded shadow-sm">
        <div class="tab-pane fade show active" id="notice">
            <p>등록된 공지사항이 없습니다. <a href="#">[전체보기]</a></p>
        </div>
        <div class="tab-pane fade" id="event">
            <p>진행 중인 행사가 없습니다. <a href="#">[전체보기]</a></p>
        </div>
    </div>
</section>

<section id="section3" class="container">
    <h2 class="mb-4 fw-bold">공간 소개</h2>
    <div id="spaceCarousel" class="carousel slide w-100" data-bs-ride="carousel">
        <div class="carousel-inner rounded shadow">
            <div class="carousel-item active">
                <img src="https://via.placeholder.com/1200x600?text=Space+01" class="d-block w-100" alt="공간1">
                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50">
                    <h5>책누리터</h5>
                    <p>자유로운 독서 공간</p>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#spaceCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#spaceCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

    // 1. 공공데이터포털에서 받은 인증키 (Encoding 키를 권장하지만 안 되면 Decoding 키로 교체)
    const WEATHER_API_KEY = '7e3732823bcfddf911e567ea22fe8bfcb55a3cc9e0ce0d9512bcf6c9d0312123';

    async function getBusanWeather() {
        // 2. 현재 날짜와 시간을 기상청 형식(YYYYMMDD / HH00)에 맞게 생성
        const now = new Date();
        const baseDate = now.toISOString().split('T')[0].replace(/-/g, '');

        // 초단기실황은 매시간 45분에 데이터가 생성되므로, 45분 이전이면 전 시간 데이터를 가져옵니다.
        let hours = now.getHours();
        if (now.getMinutes() < 45) hours -= 1;
        const baseTime = String(hours).padStart(2, '0') + '00';

        // 3. 부산광역시청 부근 좌표 (nx=98, ny=76)
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst`
            + `?serviceKey=${WEATHER_API_KEY}`
            + `&pageNo=1&numOfRows=10&dataType=JSON`
            + `&base_date=${baseDate}&base_time=${baseTime}&nx=98&ny=76`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.response.header.resultCode === '00') {
                const items = data.response.body.items.item;

                // T1H: 기온, PTY: 강수형태 (0:없음, 1:비, 3:눈 등)
                const temp = items.find(i => i.category === 'T1H').obsrValue;
                const pty = items.find(i => i.category === 'PTY').obsrValue;

                // 기온 업데이트
                document.getElementById('busan-temp').innerText = `부산 ${temp}°C`;

                // 강수 형태에 따른 아이콘 변경 (간단 버전)
                let icon = '☀️';
                if (pty === '1' || pty === '2') icon = '🌧️';
                else if (pty === '3') icon = '❄️';
                else if (now.getHours() >= 18 || now.getHours() < 6) icon = '🌙';

                document.getElementById('weather-icon').innerText = icon;

                console.log("날씨 업데이트 완료!", baseDate, baseTime);
            } else {
                console.error("API 응답 오류:", data.response.header.resultMsg);
            }
        } catch (error) {
            console.error("날씨 호출 실패:", error);
            document.getElementById('busan-temp').innerText = "날씨 정보 오류";
        }
    }

    // 페이지 로드 시 즉시 실행
    getBusanWeather();
</script>
</body>
</html>
